<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title>Edgerunner 2099</title>
        <style>
            /* Reset & Terminal Styles */
            * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
            body { 
                background: #000; 
                overflow: hidden; 
                /* Swapping to cleaner terminal font */
                font-family: 'Courier New', Courier, monospace; 
            }
            #gameCanvas { display: block; }

            /* HUD Elements */
            #centralHub {
                position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.9); border: 1px solid #00ffff;
                padding: 30px; color: #00ffff; z-index: 100; text-align: center;
                width: 90%; max-width: 400px; box-shadow: 0 0 15px #00ffff;
            }
            #topLeft { position: absolute; top: 20px; left: 20px; color: #00ffff; z-index: 15; }
            #topRight { position: absolute; top: 20px; right: 20px; color: #00ffff; font-size: 32px; z-index: 15; }
            #currency { position: absolute; top: 60px; right: 20px; color: #ffd700; z-index: 15; }
            
            .ui-btn {
                background: transparent; border: 1px solid #00ffff; color: #00ffff;
                padding: 12px; cursor: pointer; font-family: inherit;
                text-transform: uppercase; margin-top: 10px; width: 100%;
            }
            .ui-btn:active { background: #00ffff; color: #000; }
            
            #gameOver {
                position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
                color: #ff0040; font-size: 42px; display: none; z-index: 20; text-align: center;
            }

            /* Screen Shake Animation */
            .shake { animation: shakeEffect 0.2s ease-in-out; }
            @keyframes shakeEffect {
                0% { transform: translate(2px, 1px) rotate(0deg); }
                20% { transform: translate(-1px, -2px) rotate(-1deg); }
                40% { transform: translate(-3px, 0px) rotate(1deg); }
                60% { transform: translate(3px, 2px) rotate(0deg); }
                80% { transform: translate(1px, -1px) rotate(1deg); }
                100% { transform: translate(0, 0) rotate(0deg); }
            }
        </style>
    </head>
    <body>
        <div id="topLeft"><div id="levelIndicator">LEVEL 1</div></div>
        <div id="topRight"><div id="score">0</div></div>
        <div id="currency">⚡ 0</div>

        <div id="centralHub">
            <h1 style="margin-bottom: 10px">EDGERUNNER 2099</h1>
            <div id="instructions">
                <p>ARROWS / TAP → MOVE</p>
                <p>MAX SPEED CAP: 33</p>
            </div>
            <button id="playBtn" class="ui-btn" style="font-size: 20px; margin-top: 20px;">DEPLOY</button>
        </div>

        <div id="gameOver">
            CRITICAL FAILURE
            <p style="font-size: 20px; color: #00ffff;">Score: <span id="finalScore">0</span></p>
            <p style="font-size: 16px; margin-top: 20px; cursor: pointer;" onclick="location.reload()">REBOOT SYSTEM</p>
        </div>

        <canvas id="gameCanvas"></canvas>

        <script>
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");
            const hub = document.getElementById("centralHub");
            const scoreEl = document.getElementById("score");
            
            // --- CMatrix Background ---
            const characters = "0123456789ABCDEF";
            const fontSize = 14;
            let columns;
            let drops = [];

            function initMatrix() {
                columns = Math.floor(window.innerWidth / fontSize);
                drops = [];
                for (let i = 0; i < columns; i++) drops[i] = 1;
            }

            function drawMatrix() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#003333"; // Dimmed code rain
                ctx.font = fontSize + "px monospace";
                for (let i = 0; i < drops.length; i++) {
                    const text = characters.charAt(Math.floor(Math.random() * characters.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }

            // --- Game Logic ---
            let gameState = "menu";
            let score = 0;
            let currentSpeed = 9.5;
            const MAX_SPEED = 33; // Hard Cap

            const player = {
                x: 0, y: 0, targetX: 0, 
                radius: 12, 
                glow: 0
            };

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initMatrix();
                player.y = canvas.height - 150;
                player.targetX = canvas.width / 2;
                player.x = player.targetX;
            }

            window.addEventListener('resize', resize);
            resize();

            // Movement & Shake
            function move(side) {
                const laneWidth = 100;
                player.targetX = (side === 'left') ? (canvas.width / 2 - laneWidth) : (canvas.width / 2 + laneWidth);
                
                // Trigger Visual Feedback
                player.glow = 20; 
                document.body.classList.add("shake");
                setTimeout(() => document.body.classList.remove("shake"), 200);
            }

            window.addEventListener('keydown', (e) => {
                if(e.key === "ArrowLeft") move('left');
                if(e.key === "ArrowRight") move('right');
                if(e.key === " " && gameState === "menu") startGame();
            });

            canvas.addEventListener('touchstart', (e) => {
                const touchX = e.touches[0].clientX;
                move(touchX < canvas.width / 2 ? 'left' : 'right');
            });

            function startGame() {
                gameState = "playing";
                hub.style.display = "none";
                score = 0;
                currentSpeed = 9.5;
            }

            function update() {
                if (gameState === "playing") {
                    // Smooth move to target
                    player.x += (player.targetX - player.x) * 0.2;
                    
                    // Score & Speed Scaling
                    score += 0.1;
                    if (currentSpeed < MAX_SPEED) {
                        currentSpeed += 0.005;
                    } else {
                        currentSpeed = MAX_SPEED;
                    }
                    scoreEl.textContent = Math.floor(score);
                }
            }

            function draw() {
                drawMatrix(); // Layer 1: Code Rain

                // Layer 2: Player
                ctx.save();
                ctx.shadowBlur = player.glow;
                ctx.shadowColor = "#00ffff";
                ctx.fillStyle = "#00ffff";
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                if (player.glow > 0) player.glow -= 1;

                update();
                requestAnimationFrame(draw);
            }

            document.getElementById("playBtn").onclick = startGame;
            draw();
        </script>
    </body>
</html>
